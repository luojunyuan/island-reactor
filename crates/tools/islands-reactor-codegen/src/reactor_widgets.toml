# This is the Island counterpart of upstream Reactor's winui.toml. It drives
# core widget binding generation and the backend generated set_prop /
# attach_event dispatch tables. Members with `manual = true` still produce core
# event bindings but are attached by hand-written backend fallback code.
# Members with `custom = true` still produce core prop bindings but are applied
# by hand-written backend fallback code.

