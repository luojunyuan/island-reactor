[package]
name = "island-reactor"
version = "0.1.0"
edition = "2024"

[workspace]
members = ["crates/island-reactor-setup", "crates/xaml-bindings"]
resolver = "3"

[dependencies]
windows = { version = "0.62.2", features = [
    "Foundation",
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_WinRT",
    "Win32_UI_WindowsAndMessaging",
] }
xaml-bindings = { path = "crates/xaml-bindings" }

[build-dependencies]
island-reactor-setup = { path = "crates/island-reactor-setup" }
